<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: none;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            background: #667eea;
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #5a67d8;
        }

        .input-group-text {
            border-radius: 10px 0 0 10px;
        }
.spanclz{
    color: #764ba2;
}
        .toggle-eye {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
        }

        .error {
            color: red;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .card {
                padding: 15px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">

            <div class="card p-4">
                <h3 class="text-center mb-2">Create Account </h3>
                <p class="text-center text-muted mb-4 spanclz" >Join us for , make your dream trip!</p>

                <form id="signupForm">

                    <!-- Full Name -->
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" id="name" class="form-control" placeholder="Enter full name" required>
                        </div>
                        <small class="error"></small>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="email" class="form-control" placeholder="Enter email" required>
                        </div>
                        <small class="error"></small>
                    </div>

                    <!-- Phone -->
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                            <input type="text" id="phone" class="form-control" placeholder="10 digit number" required>
                        </div>
                        <small class="error"></small>
                    </div>

                    <!-- City -->
                    <div class="mb-3">
                        <label class="form-label">City</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                            <input type="text" id="city" class="form-control" placeholder="Enter city" required>
                        </div>
                        <small class="error"></small>
                    </div>

                    <!-- Gender (NEW) -->
                    <div class="mb-3">
                        <label class="form-label">Gender</label>
                        <select class="form-select">
                            <option selected disabled>Select gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <!-- Password -->
                    <div class="mb-3 position-relative">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                        <i class="bi bi-eye toggle-eye" onclick="togglePassword('password')"></i>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-3 position-relative">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required>
                        <i class="bi bi-eye toggle-eye" onclick="togglePassword('confirmPassword')"></i>
                    </div>

                    <!-- Terms Checkbox (NEW) -->
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" required>
                        <label class="form-check-label">
                            I agree to the Terms & Conditions
                        </label>
                    </div>

                    <!-- Submit -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-custom text-white">Register</button>
                    </div>

                    <!-- Link -->
                    <p class="text-center mt-3">
                        Already have an account?
                        <a href="index.html" class="fw-bold text-primary">Sign In</a>
                    </p>

                </form>
            </div>

        </div>
    </div>
</div>

<script src="js/index.js"></script>

</body>
</html>
