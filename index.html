<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-custom {
            background: #4facfe;
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #007bff;
        }

        .toggle-eye {
            position: absolute;
            right: 15px;
            top: 10px;
            cursor: pointer;
        }

        .input-group {
            position: relative;
        }

        .error {
            color: red;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .card {
                padding: 15px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <div class="card p-4">
                <h3 class="text-center mb-3">Welcome Back </h3>
                <p class="text-center text-muted mb-4">Login to continue</p>

                <form id="signinForm">

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required>
                        <small class="error"></small>
                    </div>

                    <!-- Password -->
                    <div class="mb-3 input-group">
                        <label class="form-label w-100">Password</label>
                        <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" required>
                        <span class="toggle-eye" onclick="togglePassword('loginPassword')"></span>
                    </div>

                    <!-- Button -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-custom text-white">Login</button>
                    </div>

                    <!-- Link -->
                    <p class="text-center mt-3">
                        Don't have an account?
                        <a href="SignUp.html" class="text-primary fw-bold">Sign Up</a>
                    </p>

                </form>
            </div>

        </div>
    </div>
</div>

<script src="js/index.js"></script>

</body>
</html>
